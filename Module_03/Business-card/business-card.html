<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <img class="logo" src="assets/images/craven-digital-logo.png" alt="Craven Digital logo with a pixel falcon.">
        <h1>Joshua Craven</h1>
        <h2 class="title">Software Developer</h2>
    </header>

    <main>
        <img class="pfp" src="assets/images/profile.png" alt="Portrait of Joshua Craven.">

        <div class="bio">
            <p>Developing to a brighter future!</p>
        </div>

        <img class="globe" src="assets/images/globe-solid.png" alt="Solid globe picture.">

        <div class="contact">
            <p><i class="fa-solid fa-square-phone"></i>Work phone: 555-555-5555</p>
            <p><i class="fa-solid fa-square-phone"></i>Home phone: 555-555-5555
            <p></p>
            <p><i class="fa-solid fa-envelope-circle-check"></i>Work email: <a class="work-email" href="mailto:email@email.com">email@email.com</a></p>
            <p><i class="fa-solid fa-envelope-circle-check"></i>Personal email: <a class="pers-email" href="mailto:email@email.com">email@email.com</a></p>
            <P><i class="fa-solid fa-map-location-dot"></i>Address: 123, Global Street, Global City, Global State, Global Country</p>
        </div>
    </main>

    <footer>
        <p>© Joshua Craven 2026</p>
    </footer>
</body>

</html>
